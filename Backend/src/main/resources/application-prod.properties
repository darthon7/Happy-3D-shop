# ========================
# PRODUCTION SERVER CONFIGURATION
# ========================
# Este perfil se debe usar en producción, por ejemplo agregando la variable de entorno:
# SPRING_PROFILES_ACTIVE=prod

server.port=8080

# File upload limits (10MB max)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# DATABASE CONFIGURATION (PostgreSQL)
# ========================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/happy3DShop}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / HIBERNATE (SECURE PROD DEFAULTS)
# ========================
# NUNCA usar 'update' en produccion, podría destruir datos accidentalmente
spring.jpa.hibernate.ddl-auto=validate
# No mostrar SQL en produccion para evitar Information Disclosure
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# LOGGING (SECURE PROD DEFAULTS)
# ========================
logging.level.org.springframework.security=WARN
logging.level.com.dazehaze=INFO
logging.level.org.hibernate.SQL=ERROR

# ========================
# ACTUATOR (Health Checks)
# ========================
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never

# Las demas configuraciones (Stripe, Cloudinary, Envia, EnvioClick) son heredadas del application.properties base
# y se sobreescriben a traves de las variables de entorno inyectadas en el servidor de produccion.

# EnvioClickPro overrides for production (use production URLs)
# Estos se heredan del application.properties y se pueden sobreescribir via env vars:
# ENVIOCLICK_API_URL=https://api.envioclickpro.com
# ENVIOCLICK_API_KEY=<from-server-env>
# ENVIOCLICK_RATE_ENDPOINT=/rate
# ENVIOCLICK_GENERATE_ENDPOINT=/ship/generate
