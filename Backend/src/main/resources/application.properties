spring.application.name=DazeHaze

# Enable dotenv
spring.dotenv.enabled=true
spring.dotenv.file=.env

# ========================
# SERVER CONFIGURATION
# ========================
server.port=8080

# File upload limits (10MB max)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ========================
# DATABASE CONFIGURATION (PostgreSQL)
# ========================
spring.datasource.url=jdbc:postgresql://localhost:5432/DazeHaze
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:changeme}
spring.datasource.driver-class-name=org.postgresql.Driver

# ========================
# JPA / HIBERNATE
# ========================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ========================
# LOGGING
# ========================
logging.level.org.springframework.security=DEBUG
logging.level.com.dazehaze=DEBUG

# ========================
# ACTUATOR (Health Checks)
# ========================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized

# ========================
# JWT CONFIGURATION
# ========================
jwt.secret=${JWT_SECRET}
jwt.expiration=1800000
jwt.refresh-expiration=604800000

# ========================
# CORS CONFIGURATION
# ========================
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://localhost,http://127.0.0.1}

# ========================
# OAUTH2 CONFIGURATION
# ========================
# Google OAuth2
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-google-client-id}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-google-client-secret}
spring.security.oauth2.client.registration.google.scope=email,profile

# Facebook OAuth2
spring.security.oauth2.client.registration.facebook.client-id=${FACEBOOK_CLIENT_ID:your-facebook-client-id}
spring.security.oauth2.client.registration.facebook.client-secret=${FACEBOOK_CLIENT_SECRET:your-facebook-client-secret}
spring.security.oauth2.client.registration.facebook.scope=email,public_profile

# Frontend redirect URL after OAuth login
app.oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/callback}

# ========================
# PAYMENT CONFIGURATION
# ========================
# App base URL (for payment callbacks)
app.base-url=${APP_BASE_URL:http://localhost:8080}

# Stripe Configuration
# Get your keys from: https://dashboard.stripe.com/apikeys
stripe.secret-key=${STRIPE_SECRET_KEY:sk_test_placeholder}
stripe.publishable-key=${STRIPE_PUBLISHABLE_KEY:pk_test_placeholder}
stripe.webhook-secret=${STRIPE_WEBHOOK_SECRET:whsec_placeholder}

# Envia.com Shipping Configuration (Sandbox)
envia.api-key=${ENVIA_API_KEY:placeholder}
envia.api-url=https://api-test.envia.com
envia.warehouse.name=DazeHaze
envia.warehouse.street=Circonia 605
envia.warehouse.city=Torreon
envia.warehouse.state=COA
envia.warehouse.postalCode=27054
envia.warehouse.country=MX

# PayPal Configuration
# Get your credentials from: https://developer.paypal.com/developer/applications
paypal.client-id=${PAYPAL_CLIENT_ID:placeholder}
paypal.client-secret=${PAYPAL_CLIENT_SECRET:placeholder}
paypal.mode=${PAYPAL_MODE:sandbox}

# ========================
# CLOUDINARY CONFIGURATION
# ========================
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:placeholder}
cloudinary.api-key=${CLOUDINARY_API_KEY:placeholder}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:placeholder}

# ========================
# EMAIL CONFIGURATION (Resend)
# ========================
resend.api-key=${RESEND_API_KEY:re_placeholder}
app.email.from=${APP_EMAIL_FROM:onboarding@resend.dev}
app.frontend.url=${FRONTEND_URL:http://localhost:5173}
